name: 股票分析自动发送
on:
  # 定时触发：北京时间周一到周五 早上9点（UTC时间1点）
  schedule:
    - cron: '0 1 * * 1-5'
  # 保留手动触发功能
  workflow_dispatch:

jobs:
  stock-analysis:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库代码（最基础的配置，不会出错）
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 2. 设置北京时间时区
      - name: 设置北京时间时区
        run: |
          sudo timedatectl set-timezone Asia/Shanghai

      # 3. 安装Python环境（去掉了会报错的cache配置，极简无坑）
      - name: 安装Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 4. 安装所有依赖工具
      - name: 安装依赖工具
        run: |
          python -m pip install --upgrade pip
          pip install akshare pytz

      # 5. 执行股票分析脚本并发送邮件
      - name: 执行股票分析并发送邮件
        run: |
          python stock_analysis.py
